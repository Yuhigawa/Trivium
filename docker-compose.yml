services:
  dev:
    build: .
    image: trivium-dev
    working_dir: /app
    volumes:
      - .:/app
      - deps:/app/deps
      - build:/app/_build
      - ${HOME}/.claude:${HOME}/.claude
      - ${HOME}/.claude.json:${HOME}/.claude.json
      - ${HOME}/.local/share/claude:${HOME}/.local/share/claude:ro
      - ${HOME}/.local/bin:${HOME}/.local/bin:ro
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - MIX_ENV=dev
      - HOME=${HOME}
      - PATH=${HOME}/.local/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
    stdin_open: true
    tty: true

  test:
    build: .
    image: trivium-dev
    working_dir: /app
    volumes:
      - .:/app
      - deps:/app/deps
      - build:/app/_build
    environment:
      - MIX_ENV=test
    command: mix test

  run:
    build: .
    image: trivium-dev
    working_dir: /app
    volumes:
      - .:/app
      - deps:/app/deps
      - build:/app/_build
      - ${HOME}/.claude:${HOME}/.claude
      - ${HOME}/.claude.json:${HOME}/.claude.json
      - ${HOME}/.local/share/claude:${HOME}/.local/share/claude:ro
      - ${HOME}/.local/bin:${HOME}/.local/bin:ro
    environment:
      - MIX_ENV=prod
      - HOME=${HOME}
      - PATH=${HOME}/.local/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
    stdin_open: true
    tty: true
    command: ./trivium

volumes:
  deps:
  build:
